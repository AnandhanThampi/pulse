# Scrapes 3 news sites and sends a formatted HTML email every morning at 7 AM IST
name: Morning News Digest

on:
  schedule:
    # 1:30 AM UTC = 7:00 AM IST
    - cron: '30 1 * * *'
  workflow_dispatch:

jobs:
  send-news-digest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml

      - name: Run news digest bot
        env:
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECEIVER: ${{ secrets.EMAIL_RECEIVER }}
        run: python supplementary/news_digest.py

      - name: Upload digest as artifact
        uses: actions/upload-artifact@v4
        with:
          name: news-digest
          path: news_digest.html
