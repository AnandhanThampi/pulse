# Runs on every push to main, fetches GitHub repos, updates projects.json
# The updated file is committed back to the repo automatically
name: Update Portfolio Projects

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  update-projects:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Generate projects.json
        env:
          GITHUB_USERNAME: ${{ secrets.GH_USERNAME }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python supplementary/update_projects.py

      # Commit the updated projects.json back to the repo
      - name: Commit updated projects.json
        run: |
          git config --global user.name "Pulse Bot"
          git config --global user.email "actions@github.com"
          git add projects.json
          git diff --staged --quiet || git commit -m "Auto-update projects.json [skip ci]"
          git push
